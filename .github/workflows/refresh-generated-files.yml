name: generate plantuml diagrams and the OWL representation of the Core
on: push
jobs:
  generate:
    runs-on: ubuntu-latest
    name: generate
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get install graphviz
      - name: Checkout Repository
        uses: actions/checkout@master
      - name: Process Diagrams
        run: ./tools/generate-diagrams.sh
      - name: Generate OWL file
        run: ./tools/compile-owl-tool-and-run-it.sh
      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m ":rocket: adding generated files" || exit 0
      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
      - name: Deploy to server
        env:
          CERIF2_SSH_KEY: ${{ secrets.CERIF2_SSH_KEY }}
        run: |
          mkdir -p -m 700 ~/.ssh
          umask 077
          trap 'rm 2>/dev/null -f ~/.ssh/id_ed25519' EXIT
          echo $CERIF2_SSH_KEY | base64 --decode > ~/.ssh/id_ed25519
          echo 'cerif2.eu ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK1gSq5xdHG/Bvqk1kvevx18bSMnw1enaOTIdr7PEPdR' > ~/.ssh/known_hosts
          ./tools/publish-RDF-on-main.sh
